<div class="carousel">
  <div class="carousel-container" [style.transform]="'translateX(-' + (currentSlideIndex - 1) * 100 + '%)'">
    <div class="slide">
      <img src="/assets/img-4.png" alt="Slide 1">
    </div>
    <div class="slide">
      <img src="/assets/img-5.png" alt="Slide 2">
    </div>
    <div class="slide">
      <img src="/assets/img-6.png" alt="Slide 3">
    </div>
    <div class="slide">
      <img src="/assets/img-7.png" alt="Slide 4">
    </div>
    <div class="slide">
      <img src="/assets/img-8.png" alt="Slide 5">
    </div>
    <div class="slide">
      <img src="/assets/img-9.png" alt="Slide 6">
    </div>
  </div>

  <button class="carousel-btn prev" (click)="moveSlide(-1)">❮</button>
  <button class="carousel-btn next" (click)="moveSlide(1)">❯</button>

  <div class="dots">
    <span 
      *ngFor="let i of [1, 2, 3, 4, 5, 6]" 
      class="dot" 
      [class.active]="currentSlideIndex === i"
      (click)="currentSlide(i)">
    </span>
  </div>
</div>
