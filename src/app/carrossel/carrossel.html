
  <div class="carousel">
    <div class="carousel-container" [style.transform]="'translateX(-' + (currentSlideIndex - 1) * 100 + '%)'">
      <div class="slide">
        <img src="/assets/img-1.jpg" alt="Slide 1">
      </div>
      <div class="slide">
        <img src="/assets/img-2.png" alt="Slide 2">
      </div>
      <div class="slide">
        <img src="/assets/img-3.png" alt="Slide 3">
      </div>
    </div>

    <button class="carousel-btn prev" (click)="moveSlide(-1)">❮</button>
    <button class="carousel-btn next" (click)="moveSlide(1)">❯</button>

    <div class="dots">
      <span 
        *ngFor="let i of [1, 2, 3]" 
        class="dot" 
        [class.active]="currentSlideIndex === i"
        (click)="currentSlide(i)">
      </span>
    </div>
  </div>
